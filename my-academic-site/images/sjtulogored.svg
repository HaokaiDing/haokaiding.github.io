<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Shanghai Jiao Tong University Logo (Simplified)</title>
  <desc id="desc">A simplified red circular emblem with SJTU and 1896 text.</desc>
  <defs>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#b3071a"/>
      <stop offset="1" stop-color="#d3132c"/>
    </linearGradient>
  </defs>
  <circle cx="128" cy="128" r="120" fill="url(#ring)"/>
  <circle cx="128" cy="128" r="92" fill="#fff"/>
  <circle cx="128" cy="128" r="74" fill="#b3071a"/>
  <circle cx="128" cy="128" r="64" fill="#fff"/>
  <text x="128" y="118" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="700" fill="#b3071a">SJTU</text>
  <text x="128" y="148" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#b3071a">1896</text>
</svg>
