<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haokai Ding - Academic CV</title>
    <style>
        /* 基本样式 */
        body {
            font-family: 'Arial', sans-serif;
            line-height: 1.8;
            margin: 0;
            padding: 0;
            background-color: #f9f9f9;
            color: #333;
            box-sizing: border-box;
        }

        /* 容器 */
        .container {
            max-width: 900px;
            width: 100%;
            margin: 20px auto;
            background-color: white;
            padding: 30px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            border: 1px solid #e0e0e0;
        }

        /* 标题 */
        h1 {
            text-align: center;
            font-size: 3rem;
            color: #007bff;
            margin-bottom: 20px;
            font-weight: bold;
        }

        h2 {
            font-size: 2rem;
            margin-bottom: 15px;
            color: #333;
        }

        h3 {
            font-size: 1.5rem;
            color: #444;
            margin-bottom: 10px;
        }

        hr {
            border: none;
            height: 1px;
            background-color: #ddd;
            margin-bottom: 20px;
        }

        /* 按钮 */
        .top-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 10px;
        }

        .theme-switcher {
            cursor: pointer;
            font-size: 1.5rem;
        }

        #lang-switcher {
            font-size: 1rem;
        }

        #lang-switcher a {
            text-decoration: none;
            margin-left: 10px;
            color: #333;
            font-weight: 700;
        }

        #lang-switcher a.active {
            color: #007bff;
        }

        /* 内容块 */
        section {
            margin-bottom: 40px;
        }

        ul {
            padding-left: 20px;
            margin-bottom: 20px;
        }

        ul li {
            margin-bottom: 10px;
        }

        /* 出版和奖项列表 */
        .awards-list, .publication-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .award-item, .publication-item {
            background-color: #f8f9fa;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 15px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            transition: background-color 0.3s ease;
        }

        .award-item:hover, .publication-item:hover {
            background-color: #e9ecef;
        }

        .award-name, .pub-title {
            font-weight: bold;
            font-size: 1.1rem;
            color: #333;
        }

        .award-year, .pub-venue {
            font-style: italic;
            color: #555;
            font-size: 0.95rem;
        }

        /* 头像部分 */
        .profile-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 40px;
        }

        .profile-container img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #007bff;
            margin-right: 20px;
            transition: transform 0.3s ease;
        }

        .profile-container img:hover {
            transform: scale(1.1);
        }

        .profile-info {
            text-align: center;
        }

        /* 响应式设计 */
        @media screen and (max-width: 768px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 2.5rem;
            }

            .profile-container {
                flex-direction: column;
                text-align: center;
            }

            .profile-container img {
                margin-bottom: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Haokai Ding (丁浩剀)</h1>
            <div class="top-controls">
                <button id="theme-switcher" class="theme-switcher" aria-label="Toggle dark mode">🌙</button>
                <div id="lang-switcher">
                    <a href="#" data-lang="en" class="lang-link active">English</a> /
                    <a href="#" data-lang="zh" class="lang-link">中文</a>
                </div>
            </div>
        </header>

        <div id="about-container"></div> <!-- 个人简介部分 -->
        <div id="education-container"></div> <!-- 教育背景部分 -->
        <div id="publications-container"></div> <!-- 出版部分 -->
        <div id="awards-container"></div> <!-- 奖项部分 -->

        <footer>
            <p style="text-align: center;">&copy; 2025 Haokai Ding · Last updated 2025-08-31</p>
        </footer>
    </div>

    <script>
        // 切换主题
        const themeSwitcher = document.getElementById('theme-switcher');
        const applyTheme = (theme) => {
            if (theme === 'dark') {
                document.body.classList.add('dark-mode');
                themeSwitcher.textContent = '☀️';
            } else {
                document.body.classList.remove('dark-mode');
                themeSwitcher.textContent = '🌙';
            }
        };
        applyTheme(localStorage.getItem('theme') || 'light');
        themeSwitcher.addEventListener('click', () => {
            const currentTheme = document.body.classList.contains('dark-mode') ? 'dark' : 'light';
            const nextTheme = currentTheme === 'dark' ? 'light' : 'dark';
            localStorage.setItem('theme', nextTheme);
            applyTheme(nextTheme);
        });

        // 语言切换
        function setLanguage(lang) {
            document.documentElement.setAttribute('data-lang', lang);
            document.querySelectorAll('#lang-switcher .lang-link').forEach(link => {
                link.classList.toggle('active', link.dataset.lang === lang);
            });
            try {
                localStorage.setItem('preferredLanguage', lang);
            } catch (e) {}
        }
        document.getElementById('lang-switcher').addEventListener('click', (e) => {
            const link = e.target.closest('.lang-link');
            if (!link) return;
            e.preventDefault();
            setLanguage(link.dataset.lang);
        });
        document.addEventListener('DOMContentLoaded', () => {
            setLanguage(localStorage.getItem('preferredLanguage') || 'en');
        });

        // 动态加载每个部分
        function loadSection(sectionId, fileName) {
            fetch(`sections/${fileName}`)
                .then(response => response.text())
                .then(html => {
                    document.getElementById(sectionId).innerHTML = html;
                })
                .catch(error => {
                    console.error('Error loading the section:', error);
                });
        }

        // 加载所有部分
        window.addEventListener('load', () => {
            loadSection('about-container', 'about.html');
            loadSection('education-container', 'education.html');
            loadSection('publications-container', 'publications.html');
            loadSection('awards-container', 'awards.html');
        });
    </script>
</body>
</html>
